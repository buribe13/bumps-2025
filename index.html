<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>bumps, your spotify fortune teller</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <link
      rel="preload"
      href="./Fonts/Ac437_IBM_DOS_ISO9 copy.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <!-- Load config.js first (gitignored, contains API keys) -->
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="frame-root">
      <div class="bg-gradient bg-gradient--a is-visible" aria-hidden="true"></div>
      <div class="bg-gradient bg-gradient--b" aria-hidden="true"></div>
      <div class="now-playing-marquee" aria-live="polite">
        <div class="marquee-shell">
          <div class="marquee-viewport">
            <div class="text-track">
                <span class="marquee-text"><span class="song-title">'—'</span><span class="song-artist">by —</span></span>
                <span class="marquee-text marquee-text--clone" aria-hidden="true"><span class="song-title">'—'</span><span class="song-artist">by —</span></span>
            </div>
          </div>
        </div>
      </div>

      <div class="frame-grid">
        <section class="left-stack" aria-label="Songs">
          <div class="song-cards">
            <article class="song-card">
              <div class="song-row">
                <div class="song-meta">
                  <div class="song-title">—</div>
                  <div class="song-artist">—</div>
                </div>
                <div class="song-art">
                  <div class="song-art__cover"></div>
                </div>
              </div>
              <button class="listen-btn" type="button">
                <span>Listen</span>
                <svg
                  class="arrow"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <path
                    d="M9 6L15 12L9 18"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </article>

            <article class="song-card dimmed">
              <div class="song-row">
                <div class="song-meta">
                  <div class="song-title">—</div>
                  <div class="song-artist">—</div>
                </div>
                <div class="song-art">
                  <div class="song-art__cover"></div>
                </div>
              </div>
              <button class="listen-btn" type="button">
                <span>Listen</span>
                <svg
                  class="arrow"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <path
                    d="M9 6L15 12L9 18"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </article>

            <article class="song-card dimmed">
              <div class="song-row">
                <div class="song-meta">
                  <div class="song-title">—</div>
                  <div class="song-artist">—</div>
                </div>
                <div class="song-art">
                  <div class="song-art__cover"></div>
                </div>
              </div>
              <button class="listen-btn" type="button">
                <span>Listen</span>
                <svg
                  class="arrow"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <path
                    d="M9 6L15 12L9 18"
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </article>
          </div>
          <p class="fortune-quote" id="fortuneQuote" aria-live="polite"></p>
        </section>

      </div>
    </main>

    <div class="fortune-canvas-host" id="fortuneCanvasHost" aria-hidden="true"></div>

    <!-- Floating Action Buttons -->
    <div class="fab-container">
      <div class="fab-auth" id="fabAuth">
        <button
          class="fab-btn"
          type="button"
          id="loginButton"
          aria-label="Connect Spotify"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.84-.179-.84-.66 0-.359.24-.66.54-.78 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.242 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.559.3z"
            />
          </svg>
        </button>

        <button
          class="fab-btn"
          type="button"
          id="logoutButton"
          aria-label="Disconnect Spotify"
          aria-hidden="true"
          tabindex="-1"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <polyline
              points="16 17 21 12 16 7"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <line
              x1="21"
              y1="12"
              x2="9"
              y2="12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>

      <button
        class="fab-btn"
        type="button"
        id="refreshButton"
        aria-label="Refresh songs"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M1 4v6h6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M23 20v-6h-6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>

    <a
      class="follow-btn"
      id="followButton"
      href="https://open.spotify.com/user/theuribes"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Follow me on Spotify"
    >
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="currentColor"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.84-.179-.84-.66 0-.359.24-.66.54-.78 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.242 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.559.3z"
        />
      </svg>
      Follow me
    </a>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
